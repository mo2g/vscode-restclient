name: Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run tslint

      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Show generated files
        run: ls -lh *.vsix

      - name: Create GitHub Release and upload VSIX
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" ./*.vsix \
            --title "${{ github.ref_name }}" \
            --generate-notes